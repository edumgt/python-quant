version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: investment_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: investment_db
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    # 안정적으로 검증된 태그를 고정 사용하고, 필요 시 테스트 후 버전을 상향합니다.
    image: qdrant/qdrant:v1.11.0
    container_name: investment_qdrant
    restart: unless-stopped
    ports:
      - "${VECTORDB_PORT:-6333}:6333"
      - "${VECTORDB_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: investment_backend
    restart: unless-stopped
    ports:
      - "8800:8000"
    env_file:
      - app/backend/.env
    environment:
      - MONGODB_URL=mongodb://mongo:27017
      - MONGODB_DB=investment_db
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - ./docs:/app/docs:ro

volumes:
  mongo_data:
  qdrant_data:
