services:
  mongo:
    image: ${MONGO_IMAGE}
    container_name: investment_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: investment_db
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.11.0
    container_name: investment_qdrant
    restart: unless-stopped
    ports:
      - "${VECTORDB_PORT:-6333}:6333"
      - "${VECTORDB_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  backend:
    image: ${WEBAPP_IMAGE}
    container_name: investment_backend
    restart: unless-stopped
    ports:
      - "${WEBAPP_PORT:-8000}:8000"
    env_file:
      - backend.env
    environment:
      MONGODB_URL: mongodb://mongo:27017
      MONGODB_DB: investment_db
      QDRANT_URL: http://qdrant:6333
    depends_on:
      mongo:
        condition: service_healthy

volumes:
  mongo_data:
  qdrant_data:
